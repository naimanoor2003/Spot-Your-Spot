<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seat Finder — Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #0e6b7a;
            font-family: Arial, sans-serif;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-decoration: none;
            font-size: 0.85rem;
            opacity: 0.7;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: opacity 0.2s;
        }

        .back-btn:hover { opacity: 1; }

        .logo-circle {
            width: 70px;
            height: 70px;
            background-color: #6db8b0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 0.85rem;
            opacity: 0.7;
            text-align: center;
            margin-bottom: 30px;
        }

        .card {
            background-color: white;
            border-radius: 16px;
            padding: 28px 24px;
            width: 100%;
            max-width: 380px;
            color: #333;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 0.82rem;
            color: #555;
            margin-bottom: 7px;
            font-weight: bold;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            background-color: #f5f5f5;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            color: #333;
            font-size: 0.95rem;
            transition: border-color 0.3s;
            outline: none;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: #0e6b7a;
        }

        .password-wrapper {
            position: relative;
        }

        .password-wrapper input {
            padding-right: 44px;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            color: #888;
            padding: 4px;
            transition: color 0.2s;
        }

        .toggle-password:hover { color: #0e6b7a; }

        .role-selector {
            display: flex;
            gap: 10px;
        }

        .role-option {
            flex: 1;
            position: relative;
        }

        .role-option input[type="radio"] {
            display: none;
        }

        .role-option label {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 14px;
            background-color: #f5f5f5;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            gap: 6px;
            font-weight: normal;
            color: #555;
        }

        .role-option input[type="radio"]:checked + label {
            border-color: #0e6b7a;
            background-color: #e8f4f5;
            color: #0e6b7a;
            font-weight: bold;
        }

        .role-option label:hover {
            border-color: #6db8b0;
        }

        .role-icon { font-size: 1.4rem; }
        .role-text { font-size: 0.82rem; }

        .error {
            background-color: #fdecea;
            border: 1px solid #f44336;
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 16px;
            font-size: 0.82rem;
            color: #c62828;
            text-align: center;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background-color: #0e6b7a;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 6px;
        }

        .login-btn:hover {
            background-color: #0a5260;
            transform: translateY(-1px);
        }

        .demo-creds {
            margin-top: 20px;
            padding: 14px;
            background-color: #f5f5f5;
            border-radius: 8px;
            font-size: 0.76rem;
            color: #666;
        }

        .demo-creds p { margin-bottom: 4px; }
        .demo-creds strong { color: #0e6b7a; }
    </style>
</head>
<body>

    <a href="/" class="back-btn">← Back</a>

    <div class="logo-circle">🎓</div>
    <h1>Welcome</h1>
    <p class="subtitle">Sign in to find your seat</p>

    <div class="card">

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">

            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter your username" required />
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="password-wrapper">
                    <input type="password" name="password" id="passwordInput" placeholder="Enter your password" required />
                    <button type="button" class="toggle-password" id="toggleBtn" onclick="togglePassword()">👁️</button>
                </div>
            </div>

            <div class="form-group">
                <label>I am a...</label>
                <div class="role-selector">
                    <div class="role-option">
                        <input type="radio" name="role" id="student" value="student" checked />
                        <label for="student">
                            <span class="role-icon">🎒</span>
                            <span class="role-text">Student</span>
                        </label>
                    </div>
                    <div class="role-option">
                        <input type="radio" name="role" id="admin" value="admin" />
                        <label for="admin">
                            <span class="role-icon">🔧</span>
                            <span class="role-text">Admin</span>
                        </label>
                    </div>
                </div>
            </div>

            <button type="submit" class="login-btn">Sign In →</button>

        </form>

        <div class="login-link" style="text-align:center;margin-top:16px;font-size:0.82rem;color:#666;">
            Don't have an account? <a href="/register" style="color:#0e6b7a;font-weight:bold;text-decoration:none;">Create one</a>
        </div>
        <div class="demo-creds">
            <p><strong>Student:</strong> student1 / student123</p>
            <p><strong>Admin:</strong> admin / admin123</p>
        </div>

    </div>

    <script>
        function togglePassword() {
            const input = document.getElementById('passwordInput');
            const btn = document.getElementById('toggleBtn');
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = '🙈';
            } else {
                input.type = 'password';
                btn.textContent = '👁️';
            }
        }
    </script>

</body>
</html>
